name: Deploy to Azure

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push to ACR
        run: |
          docker build -f docker/Dockerfile -t yourregistry.azurecr.io/ai-talent-hub:${{ github.sha }} backend/
          docker push yourregistry.azurecr.io/ai-talent-hub:${{ github.sha }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ai-talent-hub-backend
          images: yourregistry.azurecr.io/ai-talent-hub:${{ github.sha }}
